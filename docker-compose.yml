version: '3.8'

# ─────────────────────────────────────────────────────────────
#  Orbit X — Local Development Stack
#  Uso: docker-compose up --build
#  Pré-requisito: arquivo .env na raiz (copie .env.example)
# ─────────────────────────────────────────────────────────────

services:

  # ── RabbitMQ ────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: orbitx-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI: http://localhost:15672 (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Orbit X Backend ─────────────────────────────────────────
  orbit-x-backend:
    build:
      context: ./orbit-x-backend
      dockerfile: Dockerfile
    container_name: orbitx-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      GROQ_API_KEY: ${GROQ_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Orbit X Notification Service ────────────────────────────
  orbit-x-notification:
    build:
      context: ./orbit-x-notification-service
      dockerfile: Dockerfile
    container_name: orbitx-notification
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      PORT: 8085
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      OPS_EMAIL: ${OPS_EMAIL}
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  rabbitmq_data:
