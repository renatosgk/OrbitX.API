spring:
  application:
    name: orbit-x-backend

  datasource:
    url: jdbc:oracle:thin:@oracle.fiap.com.br:1521:ORCL
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

      keepalive-time: 60000
      connection-test-query: SELECT 1 FROM DUAL

  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:

      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        default_schema: ${DATABASE_SCHEMA}
        id:
          new_generator_mappings: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: ${DATABASE_SCHEMA:RM560416}
    default-schema: ${DATABASE_SCHEMA:RM560416}
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: false
    out-of-order: false
    repair-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  rabbitmq:
    enabled: ${RABBITMQ_ENABLED:true}
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          max-attempts: 3

  ai:
    openai:
      api-key: ${GROQ_API_KEY:DISABLED}
      base-url: https://api.groq.com/openai/v1
      chat:
        base-url: https://api.groq.com/openai/v1
        enabled: ${GROQ_AI_ENABLED:false}
        options:
          model: llama-3.3-70b-versatile
          temperature: 0.7
          max-tokens: 2048
      embedding:
        enabled: false
    retry:
      max-attempts: 2
      on-http-codes-to-retry: 429,500,503

server:

  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

orbitx:
  jwt:
    secret: ${JWT_SECRET:4F72626974582D4A57542D5365637265742D4B65792D537570657253656375726521}
    expiration: 86400000
    refresh-expiration: 604800000
  messaging:
    exchange: orbitx.exchange
    alerts-queue: orbitx.alerts.queue
    alerts-routing-key: alert.event
    thermal-queue: orbitx.thermal.queue
    thermal-routing-key: thermal.critical

feign:
  client:
    config:
      default:
        connect-timeout: 3000
        read-timeout: 5000
        logger-level: basic
  circuitbreaker:
    enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

cache:
  datacenters-ttl-seconds: 30
  satellites-ttl-seconds: 15
  sustainability-ttl-seconds: 300

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.orbitx: DEBUG
    org.springframework.security: INFO
    org.springframework.ai: INFO
    org.hibernate.SQL: DEBUG
    org.flywaydb: INFO
