spring:
  application:
    name: orbit-x-backend

  # ── Oracle Database (FIAP) ──────────────────────────────────
  datasource:
    url: jdbc:oracle:thin:@oracle.fiap.com.br:1521:ORCL
    username: ${DATABASE_USERNAME:rm559810}
    password: ${DATABASE_PASSWORD:061202}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      # Mantém conexões vivas no pool — necessário para Oracle remoto
      keepalive-time: 60000
      connection-test-query: SELECT 1 FROM DUAL

  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      # update: cria tabelas faltantes sem dropar as existentes
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        default_schema: RM559810
        id:
          new_generator_mappings: true

  # ── Flyway — migrations Oracle ────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    # baseline-on-migrate: protege DBs existentes (pré-Flyway, criados via ddl-auto: update)
    # Se a tabela flyway_schema_history não existe mas o schema já tem tabelas,
    # cria o baseline em V1 e não re-executa a migration.
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: false
    out-of-order: false
    repair-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  # ── RabbitMQ ─────────────────────────────────────────────────
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          max-attempts: 3

  # ── Spring AI via Groq (OpenAI-compatible endpoint) ───────────
  # Groq expõe a mesma API do OpenAI — basta apontar o base-url.
  # Modelos disponíveis gratuitos: llama-3.3-70b-versatile,
  #   llama-3.1-8b-instant, mixtral-8x7b-32768, gemma2-9b-it
  ai:
    openai:
      api-key: ${GROQ_API_KEY:GROQ_KEY_NOT_CONFIGURED}
      base-url: https://api.groq.com/openai/v1
      chat:
        base-url: https://api.groq.com/openai/v1
        options:
          model: llama-3.3-70b-versatile
          temperature: 0.7
          max-tokens: 2048
      # Groq NÃO suporta embeddings — desabilitado para evitar erro de contexto
      embedding:
        enabled: false
    retry:
      max-attempts: 2
      on-http-codes-to-retry: 429,500,503

server:
  # PORT env var injetado pelo Render em runtime
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

# ── JWT ─────────────────────────────────────────────────────────
orbitx:
  jwt:
    secret: ${JWT_SECRET:4F72626974582D4A57542D5365637265742D4B65792D537570657253656375726521}
    expiration: 86400000
    refresh-expiration: 604800000
  messaging:
    exchange: orbitx.exchange
    alerts-queue: orbitx.alerts.queue
    alerts-routing-key: alert.event
    thermal-queue: orbitx.thermal.queue
    thermal-routing-key: thermal.critical

# ── Feign ────────────────────────────────────────────────────────
feign:
  client:
    config:
      default:
        connect-timeout: 3000
        read-timeout: 5000
        logger-level: basic
  circuitbreaker:
    enabled: true

# ── Swagger / OpenAPI ────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

# ── Cache TTLs ───────────────────────────────────────────────────
cache:
  datacenters-ttl-seconds: 30
  satellites-ttl-seconds: 15
  sustainability-ttl-seconds: 300

# ── Actuator ─────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.orbitx: DEBUG
    org.springframework.security: INFO
    org.springframework.ai: INFO
    org.hibernate.SQL: DEBUG
    org.flywaydb: INFO
